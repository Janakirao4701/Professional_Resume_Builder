<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder - Candidates Portal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231F4E79'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='700' fill='white'%3ER%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cambria&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo" style="display: flex; align-items: center; gap: 8px;">
    Resume Builder 
    <select id="candidate-select" onchange="switchCandidate(this.value)" style="background: #1e293b; color: #fff; border: 1px solid #334155; padding: 6px 12px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; outline: none; transition: border-color 0.2s;">
      <option value="pravallika">Pravallika Boyapati (Controls Engineer)</option>
      <option value="hardhik">Hardhik Rao Chidura (Controls & Automation)</option>
      <option value="mounika">Mounika Yella (Controls Engineer)</option>
    </select>
    <button class="btn-icon" id="add-profile-btn" onclick="openProfileModal()" title="Add Candidate Profile" style="background: #3b82f6; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px; transition: background 0.2s; font-family: inherit;">+</button>
    <button class="btn-icon" id="edit-profile-btn" onclick="openEditProfileModal()" title="Edit Active Profile" style="background: #f59e0b; color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; display: none; align-items: center; justify-content: center; height: 32px; width: 32px; transition: background 0.2s;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </button>
    <button class="btn-icon" id="delete-profile-btn" onclick="deleteActiveProfile()" title="Delete Active Profile" style="background: #ef4444; color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; display: none; align-items: center; justify-content: center; height: 32px; width: 32px; transition: background 0.2s;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
    </button>
  </div>
  <div style="display: flex; gap: 12px;">
    <button class="btn-dl" id="pdf-btn" style="background: #e11d48; color: #fff;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12m0 0l4-4m-4 4l-4-4"/></svg> Download PDF
    </button>
    <button class="btn-dl" id="dl-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12m0 0l4-4m-4 4l-4-4"/></svg> Download DOCX
    </button>
  </div>
</header>

<div class="app-workspace">
  <div class="editor-pane">
    <div class="input-zone">
      <div class="textarea-wrap">
        <textarea id="resume-text" spellcheck="false" oninput="detectSectionsAndCompanies();updatePreview()"></textarea>
        <div class="tag-hint" id="chips"></div>
      </div>

      <button class="paste-btn" id="paste-btn" onclick="pasteFromClipboard()">
         Paste from Clipboard
      </button>

      <!-- Company Experience Copy (appears after paste) -->
      <div class="company-section" id="company-section">
        <div class="company-section-title">Copy Experience by Company</div>
        <div class="company-btns" id="company-btns"></div>
      </div>
    </div>
  </div>

  <div class="preview-pane">
    <div class="preview-wrap">
      <div id="resume-mockup"></div>
    </div>
  </div>
</div>

<!-- Add Profile Modal -->
<div id="profile-modal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h2 id="modal-title">Create New Candidate Profile</h2>
      <button class="modal-close" onclick="closeProfileModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="profile-form" onsubmit="event.preventDefault(); saveNewProfile();">
        <div class="form-row">
          <div class="form-group">
            <label for="prof-name">Full Name *</label>
            <input type="text" id="prof-name" required placeholder="e.g. John Doe">
          </div>
          <div class="form-group">
            <label for="prof-subtitle">Job Subtitle *</label>
            <input type="text" id="prof-subtitle" required placeholder="e.g. PLC Controls Engineer">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-email">Email Address *</label>
            <input type="email" id="prof-email" required placeholder="e.g. johndoe@example.com">
          </div>
          <div class="form-group">
            <label for="prof-phone">Phone Number *</label>
            <input type="text" id="prof-phone" required placeholder="e.g. +1 (123) 456-7890">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-location">Location (City, State/Country) *</label>
            <input type="text" id="prof-location" required placeholder="e.g. Dallas, USA">
          </div>
          <div class="form-group">
            <label for="prof-linkedin">LinkedIn URL (without https://) *</label>
            <input type="text" id="prof-linkedin" required placeholder="e.g. linkedin.com/in/johndoe">
          </div>
        </div>
        
        <div class="form-section-title">Education Degree 1</div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu1-degree">Degree & Major *</label>
            <input type="text" id="prof-edu1-degree" required placeholder="e.g. Master of Science in Computer Engineering">
          </div>
          <div class="form-group">
            <label for="prof-edu1-dates">Dates *</label>
            <input type="text" id="prof-edu1-dates" required placeholder="e.g. 09/2022 - 05/2024">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu1-school">School Name *</label>
            <input type="text" id="prof-edu1-school" required placeholder="e.g. University of Houston">
          </div>
          <div class="form-group">
            <label for="prof-edu1-location">School Location *</label>
            <input type="text" id="prof-edu1-location" required placeholder="e.g. Houston, TX">
          </div>
        </div>

        <div class="form-section-title">Education Degree 2 (Optional)</div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu2-degree">Degree & Major</label>
            <input type="text" id="prof-edu2-degree" placeholder="e.g. Bachelor of Technology">
          </div>
          <div class="form-group">
            <label for="prof-edu2-dates">Dates</label>
            <input type="text" id="prof-edu2-dates" placeholder="e.g. 06/2018 - 05/2022">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu2-school">School Name</label>
            <input type="text" id="prof-edu2-school" placeholder="e.g. SRK Institute of Technology">
          </div>
          <div class="form-group">
            <label for="prof-edu2-location">School Location</label>
            <input type="text" id="prof-edu2-location" placeholder="e.g. Andhra Pradesh, India">
          </div>
        </div>

        <div class="form-group">
          <label for="prof-certs">Certifications (Optional, comma-separated)</label>
          <input type="text" id="prof-certs" placeholder="e.g. AWS Certified Developer, PMP">
        </div>

        <div class="form-group">
          <label for="prof-resume-text">Paste Raw Resume Text (Optional, or loads default template)</label>
          <textarea id="prof-resume-text" placeholder="[PROFESSIONAL SUMMARY]&#10;...&#10;&#10;[TECHNICAL SKILLS]&#10;...&#10;&#10;[PROFESSIONAL EXPERIENCE]&#10;..." style="height: 120px; font-family: monospace; font-size: 11px;"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeProfileModal()">Cancel</button>
          <button type="submit" class="btn-save" id="modal-submit-btn">Save Profile</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/docx@7.3.0/build/index.js"></script>
<script src="app.js"></script>
</body>
</html>
