<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder - Candidates Portal</title>
<meta name="description" content="Professional resume builder - Create ATS-friendly resumes with clean typography">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111111'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='700' fill='white'%3ER%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>

<header>
  <div class="logo-area">
    <h1 class="app-title">Resume Builder</h1>
    <div class="select-wrapper">
      <select id="candidate-select" onchange="switchCandidate(this.value)" aria-label="Active Candidate Profile">
        <option value="">No Profiles Available</option>
      </select>
    </div>
  </div>
  
  <!-- Mobile Hamburger Menu Button -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
    <div class="hamburger-icon">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>
  
  <div class="action-buttons">
    <button class="btn-icon-add" id="add-profile-btn" onclick="openProfileModal()" title="Add Candidate Profile" aria-label="Add Candidate Profile">+</button>
    <button class="btn-icon-edit" id="edit-profile-btn" onclick="openEditProfileModal()" title="Edit Active Profile" aria-label="Edit Active Profile">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </button>
    <button class="btn-icon-delete" id="delete-profile-btn" onclick="deleteActiveProfile()" title="Delete Active Profile" aria-label="Delete Active Profile">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
    </button>
    
    <div class="divider-v"></div>

    <button class="btn-dl pdf-btn-style" id="export-backup-btn" onclick="exportBackup()" title="Export JSON Backup" aria-label="Export JSON Backup">
      <span>Export Backup</span>
      <span class="btn-icon-circle">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </span>
    </button>
    <button class="btn-dl pdf-btn-style" id="import-backup-btn" onclick="document.getElementById('import-backup-file').click()" title="Import JSON Backup" aria-label="Import JSON Backup">
      <span>Import Backup</span>
      <span class="btn-icon-circle">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </span>
    </button>
    <input type="file" id="import-backup-file" accept=".json" style="display:none" onchange="importBackup(this)" aria-hidden="true">
    
    <button class="btn-dl pdf-btn-style" id="pdf-btn" title="Download PDF" aria-label="Download PDF">
      <span>Download PDF</span>
      <span class="btn-icon-circle">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      </span>
    </button>
    <button class="btn-dl docx-btn-style" id="dl-btn" title="Download DOCX" aria-label="Download DOCX">
      <span>Download DOCX</span>
      <span class="btn-icon-circle">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      </span>
    </button>
  </div>
</header>

<!-- Mobile Menu Panel -->
<div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
<div class="mobile-menu-panel" id="mobile-menu-panel">
  <div class="menu-section">
    <div class="menu-section-title">Profile Actions</div>
    <button class="menu-item" id="menu-add-profile" onclick="openProfileModal(); closeMobileMenu();">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <div class="menu-item-label">Add Profile</div>
    </button>
    <button class="menu-item" id="menu-edit-profile" onclick="openEditProfileModal(); closeMobileMenu();" style="display: none;">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
      </div>
      <div class="menu-item-label">Edit Profile</div>
    </button>
    <button class="menu-item danger" id="menu-delete-profile" onclick="deleteActiveProfile(); closeMobileMenu();" style="display: none;">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      </div>
      <div class="menu-item-label">Delete Profile</div>
    </button>
  </div>
  
  <div class="menu-divider"></div>
  
  <div class="menu-section">
    <div class="menu-section-title">Backup & Restore</div>
    <button class="menu-item" onclick="exportBackup(); closeMobileMenu();">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </div>
      <div class="menu-item-label">Export Backup</div>
    </button>
    <button class="menu-item" onclick="document.getElementById('import-backup-file').click(); closeMobileMenu();">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </div>
      <div class="menu-item-label">Import Backup</div>
    </button>
  </div>
  
  <div class="menu-divider"></div>
  
  <div class="menu-section">
    <div class="menu-section-title">Download</div>
    <button class="menu-item" id="menu-pdf-btn" onclick="closeMobileMenu();">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      </div>
      <div class="menu-item-label">Download PDF</div>
    </button>
    <button class="menu-item" id="menu-dl-btn" onclick="closeMobileMenu();">
      <div class="menu-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      </div>
      <div class="menu-item-label">Download DOCX</div>
    </button>
  </div>
</div>

<div class="app-workspace">
  <div class="editor-outer-shell" id="editor-panel">
    <div class="editor-pane inner-core-card">
      <div class="input-zone">
        <div class="customizer-controls">
          <div class="control-group">
            <label for="template-select">Template</label>
            <select id="template-select" onchange="updateStyleSetting('template', this.value)" aria-label="Resume layout template selection">
              <option value="template-classic">Classic</option>
              <option value="template-modern">Modern</option>
              <option value="template-minimalist">Minimalist</option>
            </select>
          </div>
          <div class="control-group">
            <label for="font-select">Font</label>
            <select id="font-select" onchange="updateStyleSetting('font', this.value)" aria-label="Resume font style selection">
              <option value="font-serif">Serif</option>
              <option value="font-sans">Sans-serif</option>
              <option value="font-mono">Monospace</option>
            </select>
          </div>
          <div class="control-group">
            <label for="size-select">Size</label>
            <select id="size-select" onchange="updateStyleSetting('size', this.value)" aria-label="Resume font size selection">
              <option value="size-10pt">10pt</option>
              <option value="size-11pt">11pt</option>
              <option value="size-12pt">12pt</option>
            </select>
          </div>
          <div class="control-group">
            <label for="margin-select">Margin</label>
            <select id="margin-select" onchange="updateStyleSetting('margin', this.value)" aria-label="Resume page margin selection">
              <option value="margin-compact">Compact</option>
              <option value="margin-normal">Normal</option>
              <option value="margin-spacious">Spacious</option>
            </select>
          </div>
        </div>

        <div class="textarea-wrap">
          <textarea id="resume-text" spellcheck="false" oninput="detectSectionsAndCompanies();updatePreview()" aria-label="Resume markup source text"></textarea>
        </div>
        <div class="tag-hint" id="chips"></div>

        <button class="paste-btn" id="paste-btn" onclick="pasteFromClipboard()">
          <span>Paste from Clipboard</span>
          <span class="btn-icon-circle">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 2h6M12 11v6M9 14h6"/></svg>
          </span>
        </button>

        <!-- Company Experience Copy (appears after paste) -->
        <div class="company-section" id="company-section">
          <div class="company-section-title">Copy Experience by Company</div>
          <div class="company-btns" id="company-btns"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="preview-outer-shell" id="preview-panel">
    <div class="preview-pane inner-core-card">
      <div class="preview-wrap">
        <div id="resume-mockup"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Profile Modal -->
<div id="profile-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-container">
    <div class="modal-header">
      <h2 id="modal-title">Create New Candidate Profile</h2>
      <button class="modal-close" onclick="closeProfileModal()" aria-label="Close modal">&times;</button>
    </div>
    <div class="modal-body">
      <form id="profile-form" onsubmit="event.preventDefault(); saveNewProfile();">
        <div class="form-row">
          <div class="form-group">
            <label for="prof-name">Full Name *</label>
            <input type="text" id="prof-name" required placeholder="e.g. John Doe">
          </div>
          <div class="form-group">
            <label for="prof-subtitle">Job Subtitle *</label>
            <input type="text" id="prof-subtitle" required placeholder="e.g. PLC Controls Engineer">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-email">Email Address *</label>
            <input type="email" id="prof-email" required placeholder="e.g. johndoe@example.com">
          </div>
          <div class="form-group">
            <label for="prof-phone">Phone Number *</label>
            <input type="text" id="prof-phone" required placeholder="e.g. +1 (123) 456-7890">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-location">Location (City, State/Country) *</label>
            <input type="text" id="prof-location" required placeholder="e.g. Dallas, USA">
          </div>
          <div class="form-group">
            <label for="prof-linkedin">LinkedIn URL *</label>
            <input type="text" id="prof-linkedin" required placeholder="e.g. linkedin.com/in/johndoe">
          </div>
        </div>
        
        <div class="form-section-title">Education Degree 1</div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu1-degree">Degree & Major *</label>
            <input type="text" id="prof-edu1-degree" required placeholder="e.g. Master of Science in Computer Engineering">
          </div>
          <div class="form-group">
            <label for="prof-edu1-dates">Dates *</label>
            <input type="text" id="prof-edu1-dates" required placeholder="e.g. 09/2022 - 05/2024">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu1-school">School Name *</label>
            <input type="text" id="prof-edu1-school" required placeholder="e.g. University of Houston">
          </div>
          <div class="form-group">
            <label for="prof-edu1-location">School Location *</label>
            <input type="text" id="prof-edu1-location" required placeholder="e.g. Houston, TX">
          </div>
        </div>

        <div class="form-section-title">Education Degree 2 (Optional)</div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu2-degree">Degree & Major</label>
            <input type="text" id="prof-edu2-degree" placeholder="e.g. Bachelor of Technology">
          </div>
          <div class="form-group">
            <label for="prof-edu2-dates">Dates</label>
            <input type="text" id="prof-edu2-dates" placeholder="e.g. 06/2018 - 05/2022">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prof-edu2-school">School Name</label>
            <input type="text" id="prof-edu2-school" placeholder="e.g. SRK Institute of Technology">
          </div>
          <div class="form-group">
            <label for="prof-edu2-location">School Location</label>
            <input type="text" id="prof-edu2-location" placeholder="e.g. Andhra Pradesh, India">
          </div>
        </div>

        <div class="form-group">
          <label for="prof-certs">Certifications (Optional, comma-separated)</label>
          <input type="text" id="prof-certs" placeholder="e.g. AWS Certified Developer, PMP">
        </div>

        <div class="form-group">
          <label for="prof-resume-text">Paste Raw Resume Text (Optional)</label>
          <textarea id="prof-resume-text" class="modal-textarea" aria-label="Raw Resume Text" placeholder="[PROFESSIONAL SUMMARY]&#10;...&#10;&#10;[TECHNICAL SKILLS]&#10;...&#10;&#10;[PROFESSIONAL EXPERIENCE]&#10;..."></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeProfileModal()">Cancel</button>
          <button type="submit" class="btn-save" id="modal-submit-btn">Save Profile</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/docx@7.3.0/build/index.js"></script>
<script src="app.js"></script>
</body>
</html>
